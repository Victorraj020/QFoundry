[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "qforge"
version = "0.1.0"
description = "QForge Python backend — circuit analysis and simulation server"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "qiskit>=1.0,<2.0",
]

[project.optional-dependencies]
simulator = [
    "qiskit-aer>=0.13",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["qforge*"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "N"]

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true
